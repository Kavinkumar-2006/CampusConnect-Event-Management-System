<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fix Account – CampusConnect</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;background:#080808;color:#f0ece0;
  font-family:Georgia,'Times New Roman',serif;
  display:flex;align-items:center;justify-content:center;
  padding:2rem;
}
.card{
  width:100%;max-width:560px;
  background:#0f0f0f;border:2px solid rgba(212,160,23,.35);
  border-radius:24px;padding:3rem 3.5rem;
  box-shadow:0 0 60px rgba(212,160,23,.1),0 24px 80px rgba(0,0,0,.7);
  position:relative;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#d4a017,transparent);}
h1{font-size:2.4rem;color:#d4a017;margin-bottom:.5rem;}
p{font-size:1.1rem;color:rgba(240,236,224,.5);margin-bottom:2.5rem;line-height:1.6;}
.fg{margin-bottom:1.8rem;}
label{display:block;font-size:1rem;font-weight:700;color:rgba(240,236,224,.6);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem;}
input{
  width:100%;height:64px;padding:0 1.2rem;
  background:rgba(255,255,255,.05);
  border:2px solid rgba(255,255,255,.1);
  border-radius:12px;font-size:1.2rem;color:#f0ece0;
  font-family:Georgia,'Times New Roman',serif;
  transition:border-color .2s;
}
input:focus{outline:none;border-color:#d4a017;box-shadow:0 0 0 4px rgba(212,160,23,.14);}
input::placeholder{color:rgba(240,236,224,.2);}
button{
  width:100%;height:64px;
  background:linear-gradient(135deg,#d4a017,#a07810);
  color:#0a0800;border:none;border-radius:12px;
  font-size:1.3rem;font-weight:900;cursor:pointer;
  font-family:Georgia,'Times New Roman',serif;
  transition:transform .2s,box-shadow .2s;
}
button:hover{box-shadow:0 0 40px rgba(212,160,23,.5);transform:translateY(-2px);}
button:active{transform:scale(.97);}
.msg{
  margin-top:1.5rem;padding:1rem 1.2rem;border-radius:10px;
  font-size:1.1rem;font-weight:700;display:none;text-align:center;
}
.msg.ok{background:rgba(34,197,94,.1);border:2px solid rgba(34,197,94,.4);color:#4ade80;display:block;}
.msg.err{background:rgba(239,68,68,.1);border:2px solid rgba(239,68,68,.4);color:#f87171;display:block;}
.back{display:block;text-align:center;margin-top:1.5rem;color:rgba(212,160,23,.6);font-size:1rem;}
.back:hover{color:#d4a017;}
</style>
</head>
<body>
<div class="card">
  <h1>🔑 Fix Account</h1>
  <p>Enter your registered email and set a new password. This will reset your account so you can log in.</p>

  <div class="fg">
    <label>Your Email</label>
    <input type="email" id="em" placeholder="srikavin2020@gmail.com"/>
  </div>
  <div class="fg">
    <label>New Password</label>
    <input type="password" id="pw" placeholder="Enter new password (min 8 chars)"/>
  </div>

  <button onclick="fixAccount()">Reset &amp; Fix Account →</button>

  <div class="msg" id="msg"></div>
  <a href="/login" class="back">← Go to Login</a>
</div>

<script>
function fixAccount(){
  var email = document.getElementById('em').value.trim();
  var pwd   = document.getElementById('pw').value;
  var msg   = document.getElementById('msg');
  msg.className = 'msg';

  if(!email){ msg.className='msg err'; msg.textContent='Please enter your email.'; return; }
  if(!pwd||pwd.length<8){ msg.className='msg err'; msg.textContent='Password must be at least 8 characters.'; return; }

  msg.className='msg'; msg.textContent='Fixing account…'; msg.style.display='block';

  fetch('/api/auth/reset-password',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email, newPassword:pwd})
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(d.success){
      msg.className='msg ok';
      msg.textContent='✅ Password reset! Redirecting to login…';
      setTimeout(function(){ window.location.href='/login'; }, 2000);
    } else {
      msg.className='msg err';
      msg.textContent='❌ '+d.message;
    }
  })
  .catch(function(){
    msg.className='msg err';
    msg.textContent='❌ Server error. Make sure your server is running.';
  });
}
window.fixAccount=fixAccount;
</script>
</body>
</html>
